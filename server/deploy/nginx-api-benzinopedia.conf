# Backend-only: api.benzinopedia.ru → Go backend (порт 8082).
# Статика остаётся на reg.ru (37.140.192.133), сюда только REST API.
#
# DNS: api.benzinopedia.ru A → 5.188.19.170
# SSL: certbot --nginx -d api.benzinopedia.ru
# После certbot: listen 443 ssl → listen 5.188.19.170:443 ssl (иначе FastPanel parking перехватывает HTTPS)

server {
    # FastPanel parking слушает 5.188.19.170:80 default_server — нужен тот же IP,
    # иначе name-based routing не срабатывает и запросы попадают на parking.
    listen 5.188.19.170:80;
    listen [::]:80;
    server_name api.benzinopedia.ru;

    client_max_body_size 1m;

    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location / {
        return 404;
    }

    access_log /var/log/nginx/api-benzinopedia.access.log;
    error_log  /var/log/nginx/api-benzinopedia.error.log;
}
