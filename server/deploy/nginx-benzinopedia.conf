# Статика + reverse proxy /api/ → Go backend (порт 8082).
# Установка: scp в /etc/nginx/conf.d/benzinopedia.conf && nginx -t && systemctl reload nginx
#
# На VPS с root PHP-shim (api.php) не нужен — nginx проксирует напрямую.

server {
    listen 5.188.19.170:80;
    listen [::]:80;
    server_name benzinopedia.ru www.benzinopedia.ru 5.188.19.170;

    root /var/www/benzinopedia.ru;
    index index.html;

    client_max_body_size 1m;

    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/benzinopedia.access.log;
    error_log  /var/log/nginx/benzinopedia.error.log;
}
